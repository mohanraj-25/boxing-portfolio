<!DOCTYPE html>
<html>

<head>
<title>Boxing Tournament Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
🥊 Tournament Registration
</header>

<div class="container">

<form id="registerForm">

<h2>Enter Fighter Details</h2>

<input type="text" id="name" placeholder="Full Name" required>

<input type="number" id="age" placeholder="Age" required>

<select id="weight">
<option>Lightweight</option>
<option>Middleweight</option>
<option>Heavyweight</option>
</select>

<input type="text" id="experience" placeholder="Years of Experience">

<input type="email" id="email" placeholder="Email" required>

<button class="btn">Register</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
